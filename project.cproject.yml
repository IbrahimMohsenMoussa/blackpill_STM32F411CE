project:

  packs:
    - pack: Keil::STM32F4xx_DFP@^2.17.1
    - pack: ARM::CMSIS
  components:
    - component: CMSIS:CORE
    - component: Device:Startup
  setups:
    - setup: Options for Target_1
      processor:
        fpu: sp
      debug: "on"
      misc:
        - C:
            - -std=c99
          C-CPP:
            - -fno-rtti
            - -funsigned-char
            - -fshort-enums
            - -fshort-wchar
            - -ffunction-sections
            - -Wall
            - -Wextra
            - -Wno-packed
            - -Wno-reserved-id-macro
            - -Wno-unused-macros
            - -Wno-documentation-unknown-command
            - -Wno-documentation
            - -Wno-license-management
            - -Wno-parentheses-equality
          CPP:
            - -xc++
            - -std=c++11
            - -fno-exceptions
          ASM:
            - -masm=auto
          Link:
            - --map
            - --load_addr_map_info
            - --xref
            - --callgraph
            - --symbols
            - --info sizes
            - --info totals
            - --info unused
            - --info veneers
            - --strict
            - --summary_stderr
            - --info summarysizes
  groups:
    - group: src
      files:
        - file: src/stm32f411.inc
        - file: src/rcc.asm
        - file: src/port.asm
        - file: src/hardware_config.inc
        - file: src/dio.asm
        - file: src/SysTick.asm
        - file: src/adc.asm
        - file: src/keypad.asm
        - file: src/stepper.asm
        - file: src/timer.asm
        - file: src/tof400f_driver.s
        - file: src/i2c.asm
        - file: src/rtc_driver.asm
        - file: src/font.inc
        - file: src/sh1106_driver.s
        - file: src/bitmaps.asm
        - file: src/ui_driver.s
        - file: src/main.asm
        - file: src/DFPlayer_defs.s
        - file: src/DFPlayer.s
        - file: src/UART1.s
        - file: src/UART1_defs.s
        - file: src/exti.asm
        - file: src/brakes.asm
        - file: src/mpu6050.asm
        - file: src/servo_driver.s
        - file: src/fft_math.s
        - file: src/data_memory.s
        - file: src/loadcell.s
        - file: src/mfrc522.s
        - file: src/spi.s
